<footer class="site-footer mt-auto py-4">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">

    <p class="mb-0 text-muted small">
      &copy; {{ 'now' | date: "%Y" }} {{ site.author }} - Built with <a href="https://jekyllrb.com/" target="_blank" rel="noopener">Jekyll</a> and <a href="https://getbootstrap.com/" target="_blank" rel="noopener">Bootstrap</a>.
    </p>

    <div class="social-links d-flex gap-3">
      {% if site.github_username != "" %}
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener"
         aria-label="GitHub">
        <i class="bi bi-github"></i>
      </a>
      {% endif %}
      {% if site.linkedin_username != "" %}
      <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener"
         aria-label="LinkedIn">
        <i class="bi bi-linkedin"></i>
      </a>
      {% endif %}
      {% if site.twitter_username != "" %}
      <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener"
         aria-label="Twitter / X">
        <i class="bi bi-twitter-x"></i>
      </a>
      {% endif %}
      {% if site.email != "" %}
      <a href="mailto:{{ site.email }}" aria-label="Email">
        <i class="bi bi-envelope"></i>
      </a>
      {% endif %}
    </div>

  </div>
</footer>
