# ─────────────────────────────────────────────
#  Site settings — edit these first
# ─────────────────────────────────────────────
title: "Your Name"
tagline: "Designer · Developer · Creator"
description: "Personal portfolio and writing"
author: "Your Name"
email: "you@example.com"

# Social links (leave blank to hide)
github_username: ""
linkedin_username: ""
twitter_username: ""

# ─────────────────────────────────────────────
#  GitHub Pages / Jekyll settings
#  (no need to change these)
# ─────────────────────────────────────────────
baseurl: ""          # e.g. "/my-repo" if not a username.github.io site
url: ""              # e.g. "https://yourname.github.io"

markdown: kramdown
highlighter: rouge
permalink: pretty

collections:
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
