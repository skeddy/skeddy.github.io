# ─────────────────────────────────────────────
#  Site settings — edit these first
# ─────────────────────────────────────────────
title: "skeddysupport.uk"
tagline: "Helping you through the minefield of the technology"
description: "Personal portfolio and writing"
author: "Rob"
email: "sked.ster@gmail.com"

# Social links (leave blank to hide)
github_username: ""
linkedin_username: ""
twitter_username: ""

# ─────────────────────────────────────────────
#  GitHub Pages / Jekyll settings
#  (no need to change these)
# ─────────────────────────────────────────────
baseurl: ""          # e.g. "/my-repo" if not a username.github.io site
url: "https://skeddysupport.uk/"              # e.g. "https://yourname.github.io"

markdown: kramdown
highlighter: rouge
permalink: pretty

collections:
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# Disable the default GitHub Pages theme
theme: null
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings
